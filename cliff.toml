[changelog]
header = """# Changelog

All notable changes to vampire-mini will be documented in this file.\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | trim }}\
          {% if commit.body %} {{ commit.body | split(pat="\n") | first | trim }}{% endif -%}
    {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^agent\\(glm\\)", group = "Agent (GLM)" },
    { message = "^agent\\(kimi\\)", group = "Agent (Kimi)" },
    { message = "^agent\\(qwen\\)", group = "Agent (Qwen)" },
    { message = "^agent", group = "Agent Work" },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^doc", group = "Documentation" },
    { message = "^chore", group = "Miscellaneous" },
    { message = ".*", group = "Other" },
]
tag_pattern = "v[0-9].*"
sort_commits = "newest"
