name: Agent Sync - Clone, Work, Push

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name for changes'
        required: false
        default: 'agent/work'
      prompt:
        description: 'Task prompt for the agent'
        required: false
        default: ''
      agent:
        description: 'Agent to use: glm, kimi, or qwen'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - glm
          - kimi
          - qwen

concurrency:
  group: agent-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

env:
  PRIVATE_REPO: "git@github.com:GiantCroissant-Lunar/vampire-mini.git"
  GAME_DIR: "game"
  PROJECT_PATH: "project/hosts/complete-app"

jobs:
  agent-work:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'agent')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Install Godot 4.6.1 .NET
        run: |
          mkdir -p ~/.local/bin ~/.local/godot
          curl -sSfL https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_linux_x86_64.zip -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          ls /tmp/godot/
          mv /tmp/godot/Godot_v4.6.1-stable_mono_linux_x86_64/* ~/.local/godot/ || mv /tmp/godot/*/* ~/.local/godot/ || mv /tmp/godot/* ~/.local/godot/
          GODOT_BIN=$(find ~/.local/godot -maxdepth 1 -name 'Godot_*' -type f -executable | head -1)
          ln -sf "$GODOT_BIN" ~/.local/bin/godot
          rm /tmp/godot.zip
          godot --version || echo "Godot installed (headless may not print version)"

      - name: Setup SSH for private repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VAMPIRE_MINI_DEPLOY_KEY }}

      - name: Clone private repo
        run: |
          git clone ${{ env.PRIVATE_REPO }} ${{ env.GAME_DIR }}
          cd ${{ env.GAME_DIR }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.branch_name }}" >> $GITHUB_OUTPUT
          else
            ISSUE_NUM=${{ github.event.issue.number }}
            SLUG=$(echo "${{ github.event.issue.title }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | head -c 40)
            echo "name=agent/issue-${ISSUE_NUM}-${SLUG}" >> $GITHUB_OUTPUT
          fi

      - name: Create working branch
        run: |
          cd ${{ env.GAME_DIR }}
          BRANCH="${{ steps.branch.outputs.name }}"

          # Ensure root .gitignore excludes build artifacts
          cat >> .gitignore << 'GITIGNORE'
          # Build artifacts
          build/bin/
          build/obj/
          .nuke/temp/
          GITIGNORE

          # If the branch already exists on remote, check it out and rebase on main
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists on remote â€” checking out and rebasing"
            git fetch origin "$BRANCH"
            git checkout -b "$BRANCH" "origin/$BRANCH"
            git rebase main || git rebase --abort
          else
            git checkout -b "$BRANCH"
          fi
          echo "On branch: $(git branch --show-current)"

      - name: Select agent
        id: agent
        run: |
          CHOICE="${{ github.event.inputs.agent || 'auto' }}"
          if [ "$CHOICE" = "auto" ]; then
            ISSUE_NUM="${{ github.event.issue.number || github.run_number }}"

            # Check if this is a retry â€” rotate to next agent
            IS_RETRY="${{ contains(github.event.issue.labels.*.name, 'agent-retried') }}"
            if [ "$IS_RETRY" = "true" ]; then
              # On retry, shift by +1 from original assignment
              MOD=$(( (ISSUE_NUM + 1) % 3 ))
            else
              # Normal round-robin: 0=kimi, 1=glm, 2=qwen
              MOD=$((ISSUE_NUM % 3))
            fi

            if [ "$MOD" -eq 0 ]; then
              echo "engine=kimi" >> $GITHUB_OUTPUT
            elif [ "$MOD" -eq 1 ]; then
              echo "engine=glm" >> $GITHUB_OUTPUT
            else
              echo "engine=qwen" >> $GITHUB_OUTPUT
            fi
          else
            echo "engine=$CHOICE" >> $GITHUB_OUTPUT
          fi
          echo "Selected agent: $(cat $GITHUB_OUTPUT | grep engine)"

      - name: Prepare agent prompt
        id: prompt
        run: |
          PROMPT_FILE="${GITHUB_WORKSPACE}/agent-prompt.txt"

          cat > "$PROMPT_FILE" << 'PROMPT_HEADER'
          You are a game development agent working on a Godot 4.6 C# project.

          ## Project Info
          - Engine: Godot 4.6 with C# scripting (Godot.NET.Sdk/4.6.1)
          - Physics: Jolt Physics
          - Project path: project/hosts/complete-app/
          - 2D top-down vampire survival game

          ## Critical Rules
          1. Your code MUST compile on its own. Do NOT reference classes, scripts, or types that don't already exist in the project. If your task depends on a class that doesn't exist yet, create a minimal stub or interface for it in your files.
          2. Do NOT commit the .godot/ directory, bin/, or obj/ folders.
          3. Every .cs file must compile without errors. Run a mental check before writing.

          ## Godot 4.6 C# API Reference (IMPORTANT â€” use these exact APIs)

          ### Lifecycle Methods
          - `public override void _Ready()` â€” called when node enters tree
          - `public override void _Process(double delta)` â€” called every frame, use `delta` parameter NOT `Engine.DeltaTime`
          - `public override void _PhysicsProcess(double delta)` â€” called every physics tick, use `delta` parameter
          - `public override void _Input(InputEvent @event)` â€” input handling
          - `public override void _UnhandledInput(InputEvent @event)` â€” unhandled input

          ### Movement (CharacterBody2D)
          - `Velocity = new Vector2(x, y);` then `MoveAndSlide();`
          - `Input.GetVector("ui_left", "ui_right", "ui_up", "ui_down")` for directional input
          - `IsOnFloor()`, `IsOnWall()`, `IsOnCeiling()`

          ### Node Access
          - `GetNode<T>("path")` â€” get typed child node
          - `GetTree()` â€” get scene tree
          - `GetTree().CreateTimer(seconds)` â€” create timer, await with `ToSignal()`

          ### Camera2D
          - Use `Enabled = true` NOT `.Current` (Camera2D.Current does not exist in Godot 4.6)
          - `camera.MakeCurrent()` â€” make this camera active

          ### Signals
          - `[Signal] public delegate void MySignalEventHandler();` â€” signal declaration
          - `EmitSignal(SignalName.MySignal);` â€” emit signal
          - `node.MySignal += OnMySignal;` â€” connect via C# events

          ### Resources
          - `[GlobalClass] public partial class MyResource : Resource` â€” custom resource
          - `[Export] public float Speed { get; set; } = 200f;` â€” exported property
          - `GD.Load<T>("res://path")` â€” load resource

          ### Common Patterns
          - Timer: `await ToSignal(GetTree().CreateTimer(1.0), ScriptableObject.SignalName.Timeout);`
          - Scene instantiation: `var scene = GD.Load<PackedScene>("res://path.tscn"); var instance = scene.Instantiate<Node2D>();`
          - AnimationPlayer: `GetNode<AnimationPlayer>("AnimationPlayer").Play("animation_name");`
          - Sprite flashing: modulate the `Modulate` property with `Colors.Red` / `Colors.White`
          - Delta time: always use the `delta` parameter from `_Process(double delta)` or `_PhysicsProcess(double delta)`

          ### What NOT to use (common mistakes)
          - `Engine.DeltaTime` â€” DOES NOT EXIST. Use the `delta` parameter
          - `Camera2D.Current` â€” DOES NOT EXIST as a settable property. Use `MakeCurrent()` or `Enabled`
          - `GD.Print()` is fine for debugging but prefer `GD.PushWarning()` for warnings
          - `GetComponent<T>()` â€” this is Unity, NOT Godot. Use `GetNode<T>()`
          - `transform.position` â€” this is Unity. Use `Position` or `GlobalPosition`
          - `Destroy()` â€” this is Unity. Use `QueueFree()`

          ## File Organization
          - Scripts: `Scripts/<Category>/ClassName.cs` (e.g., Scripts/Player/, Scripts/Enemies/)
          - Scenes: `Scenes/<Category>/SceneName.tscn` (e.g., Scenes/Player/, Scenes/UI/)
          - Resources: `Resources/<Category>/ResourceName.tres`

          ## Code Style
          - PascalCase for classes, methods, properties, signals
          - camelCase for local variables and parameters
          - `[Export]` for inspector-exposed properties
          - `partial class` â€” all Godot classes MUST be partial
          - Every class extending a Godot node must be `public partial class`

          ## Unit Testing (GdUnit4)
          The project may use GdUnit4 v6.1.x for unit testing. IMPORTANT: Only write test files if the `complete-app.csproj` already contains a `PackageReference` for `gdUnit4.api`. If it does not, do NOT create any test files â€” they will fail to compile. Check the csproj first before writing tests.

          ### Test File Location
          - Tests go in `Scripts/Tests/<Category>/` mirroring the source structure
          - Test file naming: `<ClassName>Test.cs`

          ### Test API (GdUnit4.NET)
          ```csharp
          using GdUnit4;
          using static GdUnit4.Assertions;

          namespace VampireMini.Tests;

          [TestSuite]
          public partial class PlayerStatsTest
          {
              [TestCase]
              public void TakeDamage_ReducesHealth()
              {
                  var stats = new PlayerStats { MaxHealth = 100, CurrentHealth = 100 };
                  stats.TakeDamage(25);
                  AssertThat(stats.CurrentHealth).IsEqual(75);
              }

              [TestCase]
              [RequireGodotRuntime]  // Add this for tests that use Godot nodes
              public void PlayerNode_InitializesCorrectly()
              {
                  var player = new Node2D();
                  AssertThat(player).IsNotNull();
                  player.QueueFree();
              }

              [TestCase]
              [DataPoint(nameof(DamageData))]
              public void TakeDamage_Parameterized(int health, int damage, int expected)
              {
                  var stats = new PlayerStats { MaxHealth = health, CurrentHealth = health };
                  stats.TakeDamage(damage);
                  AssertThat(stats.CurrentHealth).IsEqual(expected);
              }

              public static IEnumerable<object[]> DamageData => new[]
              {
                  new object[] { 100, 30, 70 },
                  new object[] { 50, 60, 0 },   // clamped to 0
              };
          }
          ```

          ### When to Write Tests
          - Pure logic classes (stats, calculations, state machines)
          - Resource/data classes with validation
          - NOT needed for simple scene wiring or visual-only scripts

          ## Addons Available
          - **Phantom Camera** (`addons/phantom_camera/`): Camera2D/3D addon for smooth following, transitions, and reframing. Use `PhantomCamera2D` nodes instead of raw Camera2D manipulation when implementing camera features. C# wrapper available via `using PhantomCamera;`.

          ## Task
          PROMPT_HEADER

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            cat >> "$PROMPT_FILE" << '__AGENT_TASK_BODY__'
          ${{ github.event.inputs.prompt }}
          __AGENT_TASK_BODY__
          else
            echo "Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}" >> "$PROMPT_FILE"
            echo "" >> "$PROMPT_FILE"
            # Use heredoc to avoid shell expansion of code/XML in issue body
            cat >> "$PROMPT_FILE" << '__AGENT_TASK_BODY__'
          ${{ github.event.issue.body }}
          __AGENT_TASK_BODY__
          fi

          echo "prompt_file=$PROMPT_FILE" >> $GITHUB_OUTPUT

      # --- OpenCode agents (GLM + Qwen) ---
      - name: Install OpenCode
        if: steps.agent.outputs.engine == 'glm' || steps.agent.outputs.engine == 'qwen'
        run: |
          if ! command -v opencode &> /dev/null; then
            curl -fsSL https://opencode.ai/install | bash
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure OpenCode (GLM)
        if: steps.agent.outputs.engine == 'glm'
        run: |
          cat > "${{ env.GAME_DIR }}/opencode.json" << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "zai": {
                "options": {
                  "baseURL": "https://api.z.ai/api/coding/paas/v4",
                  "apiKey": "{env:ZAI_API_KEY}"
                }
              }
            },
            "model": "zai/glm-4.7"
          }
          EOF

      - name: Run OpenCode agent (GLM-4.7)
        id: run-glm
        if: steps.agent.outputs.engine == 'glm'
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        working-directory: ${{ env.GAME_DIR }}
        run: |
          set +e
          opencode run "$(cat ${{ steps.prompt.outputs.prompt_file }})" 2>&1 | tee /tmp/agent-output.log
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::Agent exited with code $EXIT_CODE"
          fi

      # --- Qwen agent (OpenCode + Alibaba Coding Plan) ---
      - name: Configure OpenCode (Qwen)
        if: steps.agent.outputs.engine == 'qwen'
        run: |
          cat > "${{ env.GAME_DIR }}/opencode.json" << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "bailian-coding-plan": {
                "name": "Model Studio Coding Plan",
                "options": {
                  "baseURL": "https://coding-intl.dashscope.aliyuncs.com/v1",
                  "apiKey": "{env:DASHSCOPE_API_KEY}"
                },
                "models": {
                  "qwen3.5-plus": {
                    "name": "Qwen3.5 Plus",
                    "modalities": {
                      "input": ["text"],
                      "output": ["text"]
                    },
                    "limit": {
                      "context": 1000000,
                      "output": 65536
                    }
                  }
                }
              }
            },
            "model": "bailian-coding-plan/qwen3.5-plus"
          }
          EOF

      - name: Run OpenCode agent (Qwen)
        id: run-qwen
        if: steps.agent.outputs.engine == 'qwen'
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        working-directory: ${{ env.GAME_DIR }}
        run: |
          set +e
          opencode run "$(cat ${{ steps.prompt.outputs.prompt_file }})" 2>&1 | tee /tmp/agent-output.log
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::Agent exited with code $EXIT_CODE"
          fi

      # --- Kimi agent ---
      - name: Install Kimi CLI
        if: steps.agent.outputs.engine == 'kimi'
        run: |
          if ! command -v kimi &> /dev/null; then
            curl -LsSf https://code.kimi.com/install.sh | bash
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Kimi
        if: steps.agent.outputs.engine == 'kimi'
        run: |
          mkdir -p ~/.kimi
          cat > ~/.kimi/config.toml << EOF
          default_model = "kimi-for-coding"

          [providers.kimi]
          type = "kimi"
          base_url = "https://api.kimi.com/coding/v1"
          api_key = "${{ secrets.KIMI_API_KEY }}"

          [models.kimi-for-coding]
          provider = "kimi"
          model = "kimi-for-coding"
          max_context_size = 131072
          EOF

      - name: Run Kimi agent
        id: run-kimi
        if: steps.agent.outputs.engine == 'kimi'
        working-directory: ${{ env.GAME_DIR }}
        run: |
          set +e
          kimi --quiet -p "$(cat ${{ steps.prompt.outputs.prompt_file }})" 2>&1 | tee /tmp/agent-output.log
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::Agent exited with code $EXIT_CODE"
          fi

      # --- Check if agent made changes ---
      - name: Check for agent changes
        id: changes
        run: |
          cd ${{ env.GAME_DIR }}

          # Collect agent exit code from whichever agent ran
          ENGINE="${{ steps.agent.outputs.engine }}"
          if [ "$ENGINE" = "glm" ]; then
            AGENT_EXIT="${{ steps.run-glm.outputs.exit_code }}"
          elif [ "$ENGINE" = "qwen" ]; then
            AGENT_EXIT="${{ steps.run-qwen.outputs.exit_code }}"
          else
            AGENT_EXIT="${{ steps.run-kimi.outputs.exit_code }}"
          fi
          echo "agent_exit=${AGENT_EXIT:-unknown}" >> $GITHUB_OUTPUT

          # Save agent log to file (avoid shell expansion of code in output)
          if [ -f /tmp/agent-output.log ]; then
            tail -50 /tmp/agent-output.log | head -c 3000 > /tmp/agent-tail.log
          else
            echo "<no output captured>" > /tmp/agent-tail.log
          fi

          # Check for actual code changes (ignore opencode.json, .godot/, bin/, obj/)
          CHANGED=$(git status --porcelain | grep -v 'opencode.json' | grep -v '.godot/' | grep -v '/bin/' | grep -v '/obj/' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Agent made changes:"
            echo "$CHANGED"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Agent made no code changes (exit code: ${AGENT_EXIT:-unknown})"
          fi

      # --- Pre-commit checks ---
      - name: Install check tools
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz -C ~/.local/bin gitleaks
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.12.0/git-cliff-2.12.0-x86_64-unknown-linux-gnu.tar.gz | tar xz -C ~/.local/bin --strip-components=1 git-cliff-2.12.0/git-cliff
          dotnet tool install --global GitVersion.Tool --version 6.*

      - name: Run pre-commit checks
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          task check

      # --- Build verification (Nuke) ---
      - name: Build check (Nuke)
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: ${{ env.GAME_DIR }}
        run: |
          chmod +x build.sh
          ./build.sh Check --verbosity normal

      # --- Unit tests (GdUnit4) ---
      - name: Run unit tests
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: ${{ env.GAME_DIR }}
        run: |
          # Only run tests if test files exist
          if find . -path '*/Tests/*.cs' -name '*Test*.cs' | head -1 | grep -q .; then
            dotnet test ${{ env.PROJECT_PATH }} --no-build --verbosity normal --logger "console;verbosity=detailed" || {
              echo "::warning::Unit tests failed â€” see output above"
              exit 1
            }
          else
            echo "No test files found â€” skipping unit tests"
          fi

      # --- Version and changelog ---
      - name: Generate version
        if: steps.changes.outputs.has_changes == 'true'
        id: version
        run: |
          cd ${{ env.GAME_DIR }}
          cp "${GITHUB_WORKSPACE}/GitVersion.yml" .
          VERSION=$(dotnet-gitversion /showvariable SemVer 2>&1 | tail -1 || echo "0.1.0")
          # Strip any non-semver characters
          VERSION=$(echo "$VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+.*' | head -1)
          VERSION=${VERSION:-0.1.0}
          echo "semver=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate changelog
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd ${{ env.GAME_DIR }}
          cp "${GITHUB_WORKSPACE}/cliff.toml" .
          git-cliff --config cliff.toml -o CHANGELOG.md || echo "# Changelog" > CHANGELOG.md
          rm -f cliff.toml GitVersion.yml

      # --- Push and report ---
      - name: Push changes to private repo
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd ${{ env.GAME_DIR }}
          BRANCH="${{ steps.branch.outputs.name }}"
          rm -f opencode.json

          # Ensure we're on the correct branch (build steps may have changed HEAD)
          CURRENT=$(git branch --show-current)
          if [ "$CURRENT" != "$BRANCH" ]; then
            echo "WARNING: HEAD was on '$CURRENT', switching to '$BRANCH'"
            git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH"
          fi

          echo "Current branch: $(git branch --show-current)"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "agent(${{ steps.agent.outputs.engine }}): ${{ github.event.issue.title || 'manual run' }}

          Version: ${{ steps.version.outputs.semver }}
          From: ${{ github.server_url }}/${{ github.repository }}/issues/${{ github.event.issue.number }}
          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

            echo "Commit SHA: $(git rev-parse HEAD)"
            echo "Pushing to branch: $BRANCH"
            git push --force-with-lease origin "$BRANCH"
            echo "PUSH_RESULT=pushed" >> $GITHUB_ENV
            echo "Changes pushed to private repo"

            # Verify push
            REMOTE_SHA=$(git ls-remote origin "$BRANCH" | cut -f1)
            LOCAL_SHA=$(git rev-parse HEAD)
            if [ "$REMOTE_SHA" = "$LOCAL_SHA" ]; then
              echo "Push verified: remote SHA matches local"
            else
              echo "ERROR: Push verification failed! Remote=$REMOTE_SHA Local=$LOCAL_SHA"
              exit 1
            fi
          else
            echo "PUSH_RESULT=none" >> $GITHUB_ENV
            echo "No changes to push"
          fi

      - name: Read agent log for report
        if: github.event_name != 'workflow_dispatch' && always()
        id: agent-log
        run: |
          # Read agent tail log safely into an environment file (avoids shell expansion)
          if [ -f /tmp/agent-tail.log ]; then
            echo "log<<AGENT_LOG_EOF" >> $GITHUB_OUTPUT
            cat /tmp/agent-tail.log >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "AGENT_LOG_EOF" >> $GITHUB_OUTPUT
          else
            echo "log=<no output captured>" >> $GITHUB_OUTPUT
          fi

      - name: Report back on issue
        if: github.event_name != 'workflow_dispatch' && always()
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          PUSH_RESULT: ${{ env.PUSH_RESULT }}
          AGENT_ENGINE: ${{ steps.agent.outputs.engine }}
          AGENT_EXIT: ${{ steps.changes.outputs.agent_exit }}
          HAS_CHANGES: ${{ steps.changes.outputs.has_changes }}
          AGENT_LOG: ${{ steps.agent-log.outputs.log }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const result = process.env.PUSH_RESULT;
            const branch = process.env.BRANCH_NAME;
            const engine = process.env.AGENT_ENGINE;
            const exitCode = process.env.AGENT_EXIT || 'unknown';
            const hasChanges = process.env.HAS_CHANGES;
            const agentLog = (process.env.AGENT_LOG || '').trim();
            const jobStatus = process.env.JOB_STATUS;
            let body;
            if (result === 'pushed') {
              body = `âś… Agent (${engine}) work complete. Changes pushed to private repo on branch \`${branch}\`.`;
            } else if (hasChanges === 'true' && result !== 'pushed') {
              // Agent wrote code but a later step (build, pre-commit) failed
              body = `đź”¨ Agent (${engine}) wrote code but **build/checks failed**. Changes were not pushed.\n\nThe agent produced file changes but they did not pass compilation or pre-commit checks. Check the [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions) for build errors.\n\n<details><summary>Agent output (last 50 lines)</summary>\n\n\`\`\`\n${agentLog}\n\`\`\`\n</details>`;
            } else if (exitCode !== '0' && exitCode !== 'unknown') {
              body = `âťŚ Agent (${engine}) crashed with exit code ${exitCode}.\n\n<details><summary>Agent output (last 50 lines)</summary>\n\n\`\`\`\n${agentLog}\n\`\`\`\n</details>`;
            } else {
              body = `â„ąď¸Ź Agent (${engine}) ran (exit code ${exitCode}) but produced no file changes.\n\n<details><summary>Agent output (last 50 lines)</summary>\n\n\`\`\`\n${agentLog}\n\`\`\`\n</details>`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            // Close issue on successful push
            if (result === 'pushed') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }

            // Auto-retry: if agent failed, retry once with a different agent
            if (result !== 'pushed' && context.issue?.number) {
              const labels = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });
              const hasRetried = labels.data.some(l => l.name === 'agent-retried');

              if (!hasRetried) {
                const agents = ['glm', 'kimi', 'qwen'];
                const nextAgent = agents[(agents.indexOf(engine) + 1) % 3];

                // Mark as retried to prevent infinite loops
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['agent-retried']
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `đź”„ Auto-retrying with **${nextAgent}** (${engine} did not produce a passing build).`
                });

                // Re-label to trigger agent-sync again (remove + re-add agent label)
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: 'agent'
                  });
                } catch (e) { /* label may already be removed */ }

                // Small delay then re-add
                await new Promise(r => setTimeout(r, 2000));
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['agent']
                });
              }
            }
