# Integration Build — merges all agent branches + runs verification pipeline
# Re-registered triggers: 2026-03-16
name: Integration Build

on:
  workflow_run:
    workflows: ["Agent Sync - Clone, Work, Push"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: integration
  cancel-in-progress: true

env:
  PRIVATE_REPO: "git@github.com:GiantCroissant-Lunar/vampire-mini.git"
  GAME_DIR: "game"
  PROJECT_PATH: "project/hosts/complete-app"
  SESSION_LOG_ISSUE: 174

jobs:
  integration:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Setup SSH for private repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VAMPIRE_MINI_DEPLOY_KEY }}

      - name: Clone private repo
        run: |
          git clone ${{ env.PRIVATE_REPO }} ${{ env.GAME_DIR }}
          cd ${{ env.GAME_DIR }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge all agent branches
        id: merge
        run: |
          cd ${{ env.GAME_DIR }}
          git checkout -b integration/latest main

          MERGED=""
          FAILED_MERGE=""
          # Only merge primary agent branches, skip fix-of-fix branches to prevent cascades
          for branch in $(git branch -r | grep 'origin/agent/issue-' | grep -v 'fix--' | sed 's/  origin\///'); do
            echo "--- Merging $branch ---"
            if git merge "origin/$branch" --no-edit -m "merge: $branch"; then
              MERGED="$MERGED $branch"
              echo "OK: $branch merged"
            else
              git merge --abort
              FAILED_MERGE="$FAILED_MERGE $branch"
              echo "CONFLICT: $branch skipped (merge conflict)"
            fi
          done

          echo "merged=$MERGED" >> $GITHUB_OUTPUT
          echo "conflicts=$FAILED_MERGE" >> $GITHUB_OUTPUT
          echo ""
          echo "=== Merged branches: $MERGED"
          echo "=== Conflict branches: $FAILED_MERGE"

      - name: Install Godot 4.6.1 .NET
        run: |
          mkdir -p ~/.local/bin ~/.local/godot
          curl -sSfL https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_linux_x86_64.zip -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          mv /tmp/godot/Godot_v4.6.1-stable_mono_linux_x86_64/* ~/.local/godot/ || mv /tmp/godot/*/* ~/.local/godot/ || mv /tmp/godot/* ~/.local/godot/
          GODOT_BIN=$(find ~/.local/godot -maxdepth 1 -name 'Godot_*' -type f -executable | head -1)
          ln -sf "$GODOT_BIN" ~/.local/bin/godot
          rm /tmp/godot.zip

      - name: Build check (Nuke)
        id: build
        working-directory: ${{ env.GAME_DIR }}
        run: |
          chmod +x build.sh
          BUILD_LOG=$(mktemp)
          if ./build.sh Check --verbosity normal 2>&1 | tee "$BUILD_LOG"; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "Integration build passed!"
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            # Extract compiler errors and find which branch introduced each file
            ERRORS=$(grep "error CS" "$BUILD_LOG" | head -20)
            echo "errors<<ERRORS_EOF" >> $GITHUB_OUTPUT
            echo "$ERRORS" >> $GITHUB_OUTPUT
            echo "ERRORS_EOF" >> $GITHUB_OUTPUT

            # Blame: find which branch introduced each failing file
            BLAME=""
            for file in $(grep "error CS" "$BUILD_LOG" | grep -oP '[^ ]+\.cs' | sort -u); do
              BRANCH=$(git log --all --diff-filter=A --format='%D' -- "$file" 2>/dev/null | grep -oP 'origin/agent/[^ ,]+' | head -1)
              BLAME="$BLAME\n- \`$file\` ← $BRANCH"
            done
            echo "blame<<BLAME_EOF" >> $GITHUB_OUTPUT
            echo -e "$BLAME" >> $GITHUB_OUTPUT
            echo "BLAME_EOF" >> $GITHUB_OUTPUT
          fi

      - name: Run unit tests
        if: steps.build.outputs.result == 'success'
        id: tests
        working-directory: ${{ env.GAME_DIR }}
        run: |
          if find . -path '*/Tests/*.cs' -name '*Test*.cs' | head -1 | grep -q .; then
            TEST_LOG=$(mktemp)
            if dotnet test ${{ env.GAME_DIR }}/${{ env.PROJECT_PATH }} --no-build --verbosity normal --logger "console;verbosity=detailed" 2>&1 | tee "$TEST_LOG"; then
              echo "result=success" >> $GITHUB_OUTPUT
              echo "All tests passed"
            else
              echo "result=failure" >> $GITHUB_OUTPUT
              FAILURES=$(grep -E "(Failed|Error)" "$TEST_LOG" | head -20)
              echo "failures<<TEST_EOF" >> $GITHUB_OUTPUT
              echo "$FAILURES" >> $GITHUB_OUTPUT
              echo "TEST_EOF" >> $GITHUB_OUTPUT
            fi
          else
            echo "result=skipped" >> $GITHUB_OUTPUT
            echo "No test files found — skipping"
          fi

      - name: Create fix issue on failure
        if: steps.build.outputs.result == 'failure' || steps.tests.outputs.result == 'failure'
        uses: actions/github-script@v7
        env:
          BUILD_ERRORS: ${{ steps.build.outputs.errors }}
          BLAME: ${{ steps.build.outputs.blame }}
          MERGED: ${{ steps.merge.outputs.merged }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || github.token }}
          script: |
            const errors = process.env.BUILD_ERRORS;
            const blame = process.env.BLAME;
            const merged = process.env.MERGED;
            const conflicts = process.env.CONFLICTS;

            const body = `## Integration Build Failed

            The combined agent code does not compile. A fix agent should resolve these errors.

            ## Compiler Errors
            \`\`\`
            ${errors}
            \`\`\`

            ## File Blame (which branch introduced each failing file)
            ${blame}

            ## Branches Merged
            ${merged}

            ${conflicts ? `## Merge Conflicts (skipped)\n${conflicts}` : ''}

            ## Instructions
            - Check out the \`integration/latest\` branch or merge the listed agent branches
            - Fix the compiler errors listed above
            - Ensure all files have correct \`using\` statements and references
            - The fix should go in \`project/hosts/complete-app/\`

            ## Files to Modify
            Check the compiler errors above for exact file paths and line numbers.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Fix: integration build failure`,
              body: body,
              labels: ['agent']
            });

      - name: Log merge conflicts
        if: steps.merge.outputs.conflicts != ''
        run: |
          echo "::warning::Merge conflicts in branches: ${{ steps.merge.outputs.conflicts }}"
          echo "These branches were skipped. Resolve conflicts manually or wait for the agent branches to be updated."

      - name: Feature manifest check
        if: steps.build.outputs.result == 'success'
        run: |
          chmod +x scripts/feature-check.sh
          # Run feature check but don't fail the build — it's informational
          scripts/feature-check.sh ${{ env.GAME_DIR }} || true

      - name: Headless scene verification
        if: steps.build.outputs.result == 'success'
        run: |
          cd ${{ env.GAME_DIR }}
          VERIFY_SCRIPT="${{ env.GAME_DIR }}/${{ env.PROJECT_PATH }}/Scripts/Tests/HeadlessVerify.gd"
          if [ -f "$VERIFY_SCRIPT" ]; then
            echo "Running headless scene verification..."
            timeout 60 godot --headless --path "${{ env.GAME_DIR }}/${{ env.PROJECT_PATH }}" --script "res://Scripts/Tests/HeadlessVerify.gd" || {
              echo "::warning::Headless scene verification failed — see output above"
            }
          else
            echo "No headless verification script found — skipping"
          fi

      - name: Export Linux build
        if: steps.build.outputs.result == 'success'
        run: |
          cd ${{ env.GAME_DIR }}
          EXPORT_PRESETS="${{ env.GAME_DIR }}/project/hosts/complete-app/export_presets.cfg"
          if [ ! -f "$EXPORT_PRESETS" ]; then
            echo "No export_presets.cfg — skipping export"
            echo "exported=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Install Linux export templates
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/4.6.1.stable.mono"
          mkdir -p "$TEMPLATE_DIR"
          TEMPLATE_URL="https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_export_templates.tpz"
          curl -sSfL "$TEMPLATE_URL" -o /tmp/templates.tpz
          unzip -q -o /tmp/templates.tpz -d /tmp/templates
          cp /tmp/templates/templates/* "$TEMPLATE_DIR/" || true
          rm -f /tmp/templates.tpz

          # Export
          mkdir -p build/bin
          cd project/hosts/complete-app
          godot --headless --export-release "Linux" ../../../build/bin/vampire-mini.x86_64 || {
            echo "::warning::Export failed — see output above"
            echo "exported=false" >> $GITHUB_OUTPUT
            exit 0
          }
          echo "exported=true" >> $GITHUB_OUTPUT
          ls -la ../../../build/bin/
        id: export

      - name: Smoke test exported build
        if: steps.build.outputs.result == 'success' && steps.export.outputs.exported == 'true'
        run: |
          cd ${{ env.GAME_DIR }}
          BINARY="build/bin/vampire-mini.x86_64"
          if [ ! -f "$BINARY" ]; then
            echo "No exported binary found — skipping smoke test"
            exit 0
          fi

          chmod +x "$BINARY"
          echo "Running smoke test on exported build..."
          timeout 30 "$BINARY" --headless --smoke-test 2>&1 | tee /tmp/smoke-test.log || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "::warning::Smoke test timed out after 30s"
            else
              echo "::warning::Smoke test failed with exit code $EXIT_CODE"
            fi
          }

      - name: Gameplay simulation test
        if: steps.build.outputs.result == 'success' && steps.export.outputs.exported == 'true'
        run: |
          cd ${{ env.GAME_DIR }}
          BINARY="build/bin/vampire-mini.x86_64"
          if [ ! -f "$BINARY" ]; then
            echo "No exported binary — skipping gameplay test"
            exit 0
          fi

          # Check if GameplayTest scene exists
          GAMEPLAY_SCENE="project/hosts/complete-app/Scenes/Tests/GameplayTest.tscn"
          if [ ! -f "$GAMEPLAY_SCENE" ]; then
            echo "No GameplayTest scene — skipping gameplay simulation"
            exit 0
          fi

          chmod +x "$BINARY"
          echo "Running gameplay simulation test..."
          timeout 60 "$BINARY" --headless --gameplay-test 2>&1 | tee /tmp/gameplay-test.log || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "::warning::Gameplay test timed out after 60s"
            else
              echo "::warning::Gameplay simulation test failed with exit code $EXIT_CODE"
            fi
          }

      - name: Play session transcript
        if: steps.build.outputs.result == 'success'
        run: |
          cd ${{ env.GAME_DIR }}
          PLAY_SCENE="project/hosts/complete-app/Scenes/Tests/PlaySession.tscn"
          if [ ! -f "$PLAY_SCENE" ]; then
            echo "No PlaySession scene — skipping transcript"
            echo "has_transcript=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Running 60s headless play session..."
          timeout 90 godot --headless --path project/hosts/complete-app --scene res://Scenes/Tests/PlaySession.tscn 2>&1 | tee /tmp/play-session.log || {
            EXIT_CODE=$?
            echo "::warning::Play session exited with code $EXIT_CODE"
          }
          echo "has_transcript=true" >> $GITHUB_OUTPUT
        id: transcript

      - name: Post transcript to wiki and pinned issue
        if: steps.build.outputs.result == 'success' && steps.transcript.outputs.has_transcript == 'true'
        env:
          MERGED_BRANCHES: ${{ steps.merge.outputs.merged }}
        run: |
          # Read transcript
          TRANSCRIPT=""
          if [ -f /tmp/play-session.log ]; then
            TRANSCRIPT=$(cat /tmp/play-session.log)
          else
            TRANSCRIPT="(no transcript file generated)"
          fi

          NOW=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          DATE_SLUG=$(date -u '+%Y-%m-%d-%H%M%S')
          MERGED="${{ steps.merge.outputs.merged }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          WIKI_PAGE="Play-Session-${DATE_SLUG}"
          WIKI_URL="https://github.com/${{ github.repository }}/wiki/${WIKI_PAGE}"

          # Clone wiki
          git clone https://github.com/${{ github.repository }}.wiki.git /tmp/wiki-update 2>/dev/null || {
            echo "::warning::Could not clone wiki — skipping wiki update"
            exit 0
          }
          cd /tmp/wiki-update
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create dated session page
          cat > "${WIKI_PAGE}.md" << WIKI_EOF
          # Play Session — ${NOW}

          **Run:** [${RUN_URL}](${RUN_URL})
          **Branches merged:** ${MERGED:-none}

          ## Transcript

          \`\`\`
          ${TRANSCRIPT}
          \`\`\`
          WIKI_EOF

          # Update index page — prepend new entry to sessions table
          if [ -f Play-Session-Log.md ]; then
            sed -i "s|^| _awaiting first run_ | | |$|" Play-Session-Log.md 2>/dev/null || true
            sed -i "/^## Sessions/,/^>/ {
              /^| _awaiting/d
            }" Play-Session-Log.md 2>/dev/null || true
            # Add new entry after the table header
            sed -i "/^|------|--------|------|$/a | ${NOW} | [View](${WIKI_URL}) | ${MERGED:+Merged: ${MERGED}}" Play-Session-Log.md
          fi

          # Prune sessions older than 10 days
          CUTOFF=$(date -u -d '10 days ago' '+%Y-%m-%d' 2>/dev/null || date -u -v-10d '+%Y-%m-%d' 2>/dev/null || echo "")
          if [ -n "$CUTOFF" ]; then
            for old_page in Play-Session-20*.md; do
              [ -f "$old_page" ] || continue
              # Extract date from filename: Play-Session-YYYY-MM-DD-HHMMSS.md
              PAGE_DATE=$(echo "$old_page" | grep -oP '(?<=Play-Session-)\d{4}-\d{2}-\d{2}')
              if [ -n "$PAGE_DATE" ] && [ "$PAGE_DATE" \< "$CUTOFF" ]; then
                echo "Pruning old session: $old_page (date: $PAGE_DATE, cutoff: $CUTOFF)"
                git rm "$old_page"
                # Remove from index
                sed -i "/${PAGE_DATE}/d" Play-Session-Log.md 2>/dev/null || true
              fi
            done
          fi

          git add -A
          git commit -m "Add play session ${DATE_SLUG}, prune >10 days" || {
            echo "No wiki changes to commit"
            exit 0
          }
          git push origin master || echo "::warning::Wiki push failed"

      - name: Update pinned issue
        if: steps.build.outputs.result == 'success' && steps.transcript.outputs.has_transcript == 'true'
        uses: actions/github-script@v7
        env:
          MERGED_BRANCHES: ${{ steps.merge.outputs.merged }}
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || github.token }}
          script: |
            const fs = require('fs');
            let transcript = '';
            try {
              transcript = fs.readFileSync('/tmp/play-session.log', 'utf8');
            } catch (e) {
              transcript = '(no transcript file generated)';
            }
            if (transcript.length > 60000) {
              transcript = transcript.substring(0, 60000) + '\n\n... (truncated)';
            }

            const merged = process.env.MERGED_BRANCHES || 'unknown';
            const now = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            const dateSlug = new Date().toISOString().replace(/[-:T]/g, m => m === 'T' ? '-' : m).substring(0, 17).replace(/:/g,'');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const wikiUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/wiki`;

            const body = [
              `## Gameplay Session Log`,
              ``,
              `> **Wiki:** ${wikiUrl}`,
              `> **All sessions:** ${wikiUrl}/Play-Session-Log`,
              ``,
              `### Latest Transcript — ${now}`,
              ``,
              `**Run:** [${runUrl}](${runUrl})`,
              `**Branches merged:** ${merged.trim() || 'none'}`,
              ``,
              `<details open><summary>Play Session (60s headless)</summary>`,
              ``,
              '```',
              transcript,
              '```',
              ``,
              `</details>`,
              ``,
              `---`,
              `> Auto-updated by integration pipeline. Full history on [wiki](${wikiUrl}/Play-Session-Log).`
            ].join('\n');

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.SESSION_LOG_ISSUE }},
              body: body
            });

      - name: Push integration branch on success
        if: steps.build.outputs.result == 'success'
        run: |
          cd ${{ env.GAME_DIR }}
          git push origin integration/latest --force

      - name: Fast-forward main to include all merged agent code
        if: steps.build.outputs.result == 'success'
        run: |
          cd ${{ env.GAME_DIR }}
          # Merge integration/latest into main so main always has the latest working code
          git checkout main
          git merge integration/latest --no-edit -m "integration: merge all passing agent code into main" || {
            echo "::warning::Could not fast-forward main — merge conflict. Skipping main update."
            exit 0
          }
          git push origin main
